<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbox · WhatsApp Multi-Bot</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;padding-bottom:70px}
    header{background:#1e293b;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155;position:sticky;top:0;z-index:50}
    header a{color:#94a3b8;text-decoration:none;font-size:18px;padding:4px}
    header h1{font-size:17px;flex:1}
    header select{background:#0f172a;border:1px solid #334155;color:#f1f5f9;padding:6px 10px;border-radius:8px;font-size:13px;max-width:120px}

    .chat-list{flex:1;overflow-y:auto}
    .chat-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #1e293b;cursor:pointer;transition:background .15s}
    .chat-item:active{background:#1e293b}
    .chat-item .avatar{width:44px;height:44px;border-radius:50%;background:#25d36622;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .chat-item .info{flex:1;min-width:0}
    .chat-item .info .name{font-size:15px;font-weight:500}
    .chat-item .info .preview{font-size:12px;color:#64748b;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chat-item .time{font-size:11px;color:#64748b;flex-shrink:0}

    /* ── Chat view ── */
    .chat-view{display:none;flex-direction:column;height:100vh;position:fixed;top:0;left:0;right:0;bottom:70px;background:#0f172a;z-index:60}
    .chat-view.active{display:flex}
    .chat-header{background:#1e293b;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155}
    .chat-header .back{font-size:20px;cursor:pointer;color:#94a3b8;padding:4px}
    .chat-header .name{font-size:16px;font-weight:500;flex:1}
    .chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}
    .msg{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.4;word-wrap:break-word}
    .msg.in{background:#1e293b;align-self:flex-start;border-bottom-left-radius:4px}
    .msg.out{background:#25d36622;color:#25d366;align-self:flex-end;border-bottom-right-radius:4px}
    .msg .mtime{font-size:10px;color:#64748b;margin-top:4px;text-align:right}
    .chat-input{display:flex;gap:8px;padding:10px 12px;background:#1e293b;border-top:1px solid #334155}
    .chat-input textarea{flex:1;background:#0f172a;border:1px solid #334155;border-radius:12px;padding:10px 14px;color:#f1f5f9;font-size:14px;resize:none;outline:none;min-height:42px;max-height:120px}
    .chat-input textarea:focus{border-color:#25d366}
    .chat-input button{background:#25d366;color:#0f172a;border:none;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0;transition:transform .15s}
    .chat-input button:active{transform:scale(.9)}
    .empty-state{text-align:center;padding:40px 20px;color:#64748b}
    .empty-state .big{font-size:40px;margin-bottom:12px}

    .tab-bar{position:fixed;bottom:0;left:0;right:0;background:#1e293b;display:flex;border-top:1px solid #334155;z-index:70}
    .tab-bar a{flex:1;text-align:center;padding:10px;color:#64748b;text-decoration:none;font-size:11px}
    .tab-bar a.active{color:#25d366}
    .tab-bar a span{font-size:20px;display:block;margin-bottom:2px}
  </style>
</head>
<body>
  <header>
    <a href="/">←</a>
    <h1>💬 Inbox</h1>
    <select id="session-select" onchange="loadChats()">
      {% for s in sessions %}
      <option value="{{ s.name }}">{{ s.name }} {{ '🟢' if s.connected else '🔴' }}</option>
      {% endfor %}
    </select>
  </header>

  <!-- Chat list -->
  <div class="chat-list" id="chat-list">
    <div class="empty-state">
      <div class="big">💬</div>
      <p>Select a session above</p>
    </div>
  </div>

  <!-- Chat view overlay -->
  <div class="chat-view" id="chat-view">
    <div class="chat-header">
      <span class="back" onclick="closeChat()">←</span>
      <span class="name" id="chat-peer-name">Contact</span>
    </div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input">
      <textarea id="msg-input" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>

  <nav class="tab-bar">
    <a href="/"><span>📡</span>Dashboard</a>
    <a href="/inbox" class="active"><span>💬</span>Inbox</a>
    <a href="/search"><span>🔍</span>Search</a>
    <a href="/media"><span>📸</span>Media</a>
    <a href="/groups"><span>👥</span>Groups</a>
    <a href="/analytics"><span>📊</span>Analytics</a>
    <a href="/settings"><span>⚙️</span>Settings</a>
  </nav>

  <script>
    let currentSession = '{{ sessions[0].name if sessions else "main" }}';
    let currentPeer = null;
    let refreshInterval = null;

    document.getElementById('session-select').value = currentSession;

    function loadChats() {
      currentSession = document.getElementById('session-select').value;
      fetch('/api/chats/' + currentSession)
        .then(r => r.json())
        .then(chats => {
          const list = document.getElementById('chat-list');
          if (!chats.length) {
            list.innerHTML = '<div class="empty-state"><div class="big">📭</div><p>No conversations yet</p></div>';
            return;
          }
          list.innerHTML = chats.map(c => `
            <div class="chat-item" onclick="openChat('${c.peer}', '${c.name || c.peer}')">
              <div class="avatar">👤</div>
              <div class="info">
                <div class="name">${c.name || c.peer}</div>
                <div class="preview">${(c.last_msg || '').substring(0,50)}</div>
              </div>
              <div class="time">${(c.updated_at || '').slice(11,16)}</div>
            </div>
          `).join('');
        });
    }

    function openChat(peer, name) {
      currentPeer = peer;
      document.getElementById('chat-peer-name').textContent = name;
      document.getElementById('chat-view').classList.add('active');
      loadMessages();

      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(loadMessages, 3000);
    }

    function closeChat() {
      document.getElementById('chat-view').classList.remove('active');
      if (refreshInterval) clearInterval(refreshInterval);
      currentPeer = null;
    }

    function loadMessages() {
      if (!currentPeer) return;
      fetch('/api/chat/' + currentSession + '/' + encodeURIComponent(currentPeer))
        .then(r => r.json())
        .then(msgs => {
          const container = document.getElementById('chat-msgs');
          container.innerHTML = msgs.map(m => `
            <div class="msg ${m.direction}">
              ${m.body}
              <div class="mtime">${(m.created_at || '').slice(11,19)}</div>
            </div>
          `).join('');
          container.scrollTop = container.scrollHeight;
        });
    }

    function sendMsg() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentPeer) return;

      fetch('/api/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session: currentSession, peer: currentPeer, text})
      }).then(r => r.json()).then(data => {
        if (data.ok) {
          input.value = '';
          loadMessages();
          loadChats();
        }
      });
    }

    loadChats();
    setInterval(loadChats, 5000);
  </script>
</body>
</html>
