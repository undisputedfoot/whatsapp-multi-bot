# 🤖 WhatsApp Multi-Bot — Render Blueprint (Docker)
# Deploy: https://render.com/deploy?repo=https://github.com/undisputedfoot/whatsapp-multi-bot

services:
  - type: web
    name: whatsapp-multi-bot
    runtime: docker
    repo: https://github.com/undisputedfoot/whatsapp-multi-bot
    plan: free
    region: oregon
    healthCheckPath: /login
    envVars:
      - key: BOT_LANGUAGE
        value: en
      - key: SESSION_NAMES
        value: main
      - key: BROWSER_MODE
        value: local
      - key: AI_PROVIDER
        value: openrouter
      - key: AI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASS
        value: admin123
      - key: PYTHONUNBUFFERED
        value: 1
