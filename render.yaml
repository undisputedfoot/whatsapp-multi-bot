# 🤖 WhatsApp Multi-Bot — Render Blueprint
# Deploy: https://render.com/deploy?repo=https://github.com/undisputedfoot/whatsapp-multi-bot

services:
  - type: web
    name: whatsapp-multi-bot
    runtime: python
    repo: https://github.com/undisputedfoot/whatsapp-multi-bot
    plan: free
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      python -m playwright install chromium
      python -m playwright install-deps chromium
    startCommand: gunicorn -k eventlet -w 1 -b 0.0.0.0:5000 'main:create_app()'
    healthCheckPath: /login
    envVars:
      - key: BOT_LANGUAGE
        value: en
      - key: SESSION_NAMES
        value: main
      - key: BROWSER_MODE
        value: remote
      - key: AI_PROVIDER
        value: none
      - key: AI_API_KEY
        value: ""
      - key: GOOGLE_API_KEY
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: DASHBOARD_USER
        value: admin
      - key: DASHBOARD_PASS
        value: admin123
      - key: PYTHONUNBUFFERED
        value: 1
